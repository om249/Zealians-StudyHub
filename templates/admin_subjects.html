<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Subjects</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">

  {% include 'nav_admin.html' %}
  {% include 'nav.html' %}

  <div class="max-w-6xl mx-auto pt-28 px-6">

    <div class="flex justify-between items-center mb-6">
      <h2 class="text-3xl font-bold">Subjects</h2>
      <a href="/admin/subjects/create" class="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700">
        ➕ Add Subject
      </a>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

      {% for s in subjects %}
      <div class="bg-white p-6 rounded-xl shadow">

        <h3 class="text-xl font-semibold text-indigo-700">{{ s.name }}</h3>
        <p class="text-sm text-gray-500 mt-1">Course: {{ s.course }}</p>

        <a href="/admin/subjects/{{ s._id }}/chapters"
          class="mt-4 inline-block text-sm text-indigo-600 hover:underline">
          Manage Chapters →
        </a>

      </div>
      {% endfor %}

      {% if subjects|length == 0 %}
      <p class="text-gray-500">No subjects added yet.</p>
      {% endif %}

    </div>

  </div>

</body>

</html>
