<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Create MCQ Test</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">

  {% include 'nav_admin.html' %}
  {% include 'nav.html' %}

  <div class="max-w-4xl mx-auto pt-28 px-6 bg-white rounded-2xl shadow p-8">

    <h1 class="text-2xl font-bold text-indigo-700 mb-6">Create MCQ Test</h1>

    <form method="POST" class="space-y-6">

      <div>
        <label class="block font-semibold mb-1">Test Title</label>
        <input type="text" name="title" class="w-full p-3 border rounded-lg" required>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div>
          <label class="block font-semibold mb-1">Course</label>
          <select name="course" class="w-full p-3 border rounded-lg">
            <option>MCA</option>
            <option>MBA</option>
            <option>IMCA</option>
          </select>
        </div>
        <div>
          <label class="block font-semibold mb-1">Subject</label>
          <input type="text" name="subject" class="w-full p-3 border rounded-lg" required>
        </div>
        <div>
          <label class="block font-semibold mb-1">Semester</label>
          <select name="semester" class="w-full p-3 border rounded-lg">
            <option>Sem 1</option>
            <option>Sem 2</option>
            <option>Sem 3</option>
            <option>Sem 4</option>
          </select>
        </div>
      </div>

      <div>
        <label class="block font-semibold mb-1">Duration (minutes, 0 = No limit)</label>
        <input type="number" name="duration" class="w-full p-3 border rounded-lg" value="0">
      </div>

      <div class="mt-6 p-4 border rounded-xl bg-gray-50">
        <h2 class="text-xl font-semibold text-indigo-600 mb-4">Questions</h2>
        <div id="q-container" class="space-y-6"></div>
        <button type="button" onclick="addQuestion()" class="mt-4 px-4 py-2 bg-indigo-600 text-white rounded-lg">
          + Add Question
        </button>
      </div>

      <button class="w-full mt-6 py-3 bg-indigo-600 text-white rounded-lg text-lg font-semibold">
        Save Test
      </button>

    </form>

  </div>

  <script>
    let qIndex = 0;

    function addQuestion() {
      const box = document.getElementById("q-container");
      const html = `
    <div class="border p-4 rounded-xl bg-white shadow">
      <h3 class="font-semibold mb-2">Question ${qIndex + 1}</h3>
      <input type="text" name="question_${qIndex}" placeholder="Enter question"
             class="w-full p-2 border rounded mb-3" required>

      <div class="grid grid-cols-2 gap-3">
        <input type="text" name="A_${qIndex}" placeholder="Option A" class="p-2 border rounded" required>
        <input type="text" name="B_${qIndex}" placeholder="Option B" class="p-2 border rounded" required>
        <input type="text" name="C_${qIndex}" placeholder="Option C" class="p-2 border rounded" required>
        <input type="text" name="D_${qIndex}" placeholder="Option D" class="p-2 border rounded" required>
      </div>

      <select name="correct_${qIndex}" class="w-full p-2 border rounded mt-3" required>
        <option value="">Correct Option</option>
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
        <option value="D">D</option>
      </select>
    </div>
  `;
      box.insertAdjacentHTML("beforeend", html);
      qIndex++;
    }
  </script>

</body>

</html>
