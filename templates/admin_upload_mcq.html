<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Create MCQ Test - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">

  {% if session.get('role') in ['admin', 'faculty'] %}
  {% include 'nav_admin.html' %}
  {% else %}
  {% include 'nav_student.html' %}
  {% endif %}

  <div class="max-w-4xl mx-auto mt-28 bg-white p-8 rounded-xl shadow-lg">

    <h2 class="text-3xl font-bold text-indigo-600 mb-6">
      Create MCQ Test
    </h2>

    <form method="POST" class="space-y-5">

      <!-- Course -->
      <div>
        <label class="font-semibold">Course</label>
        <select id="courseSelect" name="course" class="w-full p-3 border rounded" required>
          <option value="">Select Course</option>
          <option value="MCA">MCA</option>
          <option value="MBA">MBA</option>
          <option value="IMCA">IMCA</option>
        </select>
      </div>

      <!-- Subject -->
      <div>
        <label class="font-semibold">Subject</label>
        <select id="subjectSelect" name="subject_id" class="w-full p-3 border rounded" required disabled>
          <option value="">Select Subject</option>
        </select>
      </div>

      <!-- Chapter -->
      <div>
        <label class="font-semibold">Chapter</label>
        <select id="chapterSelect" name="chapter_id" class="w-full p-3 border rounded" required disabled>
          <option value="">Select Chapter</option>
        </select>
      </div>

      <!-- DIVISION -->
      <div>
        <label class="block font-semibold mb-2">Divisions</label>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
          {% for d in ["A","B","C","D"] %}
          <label class="flex items-center gap-2">
            <input type="checkbox" name="divisions" value="{{ d }}" class="w-4 h-4">
            {{ d }}
          </label>
          {% endfor %}
        </div>

        <p class="text-sm text-gray-500 mt-2">
          Select one or more divisions
        </p>
      </div>

      <!-- Test Title -->
      <div>
        <label class="font-semibold">Test Title</label>
        <input type="text" name="title" class="w-full p-3 border rounded" required>
      </div>

      <!-- Duration -->
      <div>
        <label class="font-semibold">Duration (minutes)</label>
        <input type="number" name="duration" class="w-full p-3 border rounded" required>
      </div>

      <!-- Questions -->
      <div class="border p-4 rounded bg-gray-50">
        <h3 class="text-xl font-semibold mb-4">Questions</h3>
        <div id="questions"></div>

        <button type="button" onclick="addQuestion()" class="mt-3 px-4 py-2 bg-indigo-600 text-white rounded">
          + Add Question
        </button>
      </div>

      <button class="w-full py-3 bg-indigo-600 text-white rounded-lg">
        Submit
      </button>

    </form>
  </div>

  <!-- ================= QUESTIONS ================= -->
  <script>
    let index = 0;

    function addQuestion() {
      document.getElementById("questions").insertAdjacentHTML("beforeend", `
    <div class="border p-4 mt-4 rounded bg-white">
      <input name="question_${index}" placeholder="Question"
             class="w-full p-2 border rounded mb-2" required>

      <div class="grid grid-cols-2 gap-2">
        <input name="A_${index}" placeholder="Option A" class="p-2 border rounded" required>
        <input name="B_${index}" placeholder="Option B" class="p-2 border rounded" required>
        <input name="C_${index}" placeholder="Option C" class="p-2 border rounded" required>
        <input name="D_${index}" placeholder="Option D" class="p-2 border rounded" required>
      </div>

      <select name="correct_${index}"
              class="w-full p-2 border rounded mt-2" required>
        <option value="">Correct Answer</option>
        <option>A</option><option>B</option>
        <option>C</option><option>D</option>
      </select>
    </div>
  `);
      index++;
    }
  </script>

  <!-- ================= DROPDOWNS ================= -->
  <script>
    const courseSelect = document.getElementById("courseSelect");
    const subjectSelect = document.getElementById("subjectSelect");
    const chapterSelect = document.getElementById("chapterSelect");

    // Load subjects
    courseSelect.addEventListener("change", async () => {
      subjectSelect.disabled = true;
      chapterSelect.disabled = true;
      chapterSelect.innerHTML = '<option value="">Select Chapter</option>';

      if (!courseSelect.value) return;

      const res = await fetch(`/api/subjects/${courseSelect.value}`);
      const data = await res.json();

      subjectSelect.innerHTML = '<option value="">Select Subject</option>';
      data.forEach(s => {
        subjectSelect.innerHTML += `<option value="${s.id}">${s.name}</option>`;
      });

      subjectSelect.disabled = false;
    });

    // Load chapters (single source of truth)
    async function loadChapters(subjectId) {
      chapterSelect.innerHTML = "<option>Loading...</option>";
      chapterSelect.disabled = true;

      const res = await fetch(`/api/chapters/${subjectId}`);
      const data = await res.json();

      chapterSelect.innerHTML = '<option value="">Select Chapter</option>';
      data.forEach(c => {
        chapterSelect.innerHTML += `
      <option value="${c._id}">
        Chapter ${c.chapter_no}: ${c.title}
      </option>
    `;
      });

      chapterSelect.disabled = false;
    }

    // On subject change
    subjectSelect.addEventListener("change", () => {
      if (subjectSelect.value) {
        loadChapters(subjectSelect.value);
      }
    });

    // Auto-load chapters if subject is preselected
    document.addEventListener("DOMContentLoaded", () => {
      if (subjectSelect.value) {
        loadChapters(subjectSelect.value);
      }
    });
  </script>

</body>

</html>
